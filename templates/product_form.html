{% extends 'base.html' %}
{% block title %}{{ action }} Product{% endblock %}
{% block page_title %}{{ action }} Product{% endblock %}
{% block content %}
<div style="max-width:700px;">
    <div class="card">
        <div class="card-header"><i class="fas fa-box me-2 text-primary"></i>{{ action }} Product</div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Product Name *</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name if product }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">SKU *</label>
                        <input type="text" name="sku" class="form-control" value="{{ product.sku if product }}" required placeholder="e.g. PROD-001">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select name="category_id" class="form-select">
                            <option value="">— No Category —</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Unit</label>
                        <select name="unit" class="form-select">
                            {% for u in ['pcs', 'kg', 'g', 'ltr', 'ml', 'box', 'pack', 'dozen', 'meter'] %}
                            <option value="{{ u }}" {% if product and product.unit == u %}selected{% endif %}>{{ u }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Low Stock Alert</label>
                        <input type="number" name="low_stock_threshold" class="form-control" value="{{ product.low_stock_threshold if product else 10 }}" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Selling Price (PKR) *</label>
                        <div class="input-group">
                            <span class="input-group-text">PKR</span>
                            <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price if product }}" required min="0">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cost Price (PKR)</label>
                        <div class="input-group">
                            <span class="input-group-text">PKR</span>
                            <input type="number" name="cost_price" class="form-control" step="0.01" value="{{ product.cost_price if product else 0 }}" min="0">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" name="stock_quantity" class="form-control" value="{{ product.stock_quantity if product else 0 }}" required min="0">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ product.description if product }}</textarea>
                    </div>
                    <div class="col-12 d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>{{ action }} Product</button>
                        <a href="{{ url_for('inventory') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
